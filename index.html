
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delicias da Ely</title>
    <style>
        :root {
            --orange: #ff6600;
            --green: #2e7d32;
            --light-green: #e8f5e9;
            --red: #d32f2f;
            --Cor-do-Fundo: #feeefd;
            --verde: #63d863;
            --rodape: #910d80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background-color: var(--Cor-do-Fundo); color: #333; max-width: 450px; margin: 0 auto; overflow-x: hidden; }

        /* HEADER */
        .header { background: white; padding-top: 40px; text-align: center; border-radius: 0 0 40px 40px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .status-badge { position: absolute; top: 15px; left: 15px; padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .status-aberto { background: var(--light-green); color: #2e7d32; }
        .status-fechado { background: #ffebee; color: var(--red); }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-green { background: #4caf50; animation: blink 1.2s infinite; }
        .dot-red { background: var(--red); }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .cart-btn { position: fixed; top: 20px; right: 20px; background: var(--orange); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; z-index: 999; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .cart-vibrant { animation: vibrateGlow 0.8s infinite alternate; border: 2px solid white; }
        @keyframes vibrateGlow { 0% { box-shadow: 0 0 5px var(--orange); transform: scale(1); } 100% { box-shadow: 0 0 20px var(--orange); transform: scale(1.1); } }

        .logo-circle { width: 130px; height: 130px; background: var(--orange); border-radius: 50%; margin: 0 auto; border: 4px solid white; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; }

        /* CARROSSEL */
        .carousel-container { display: flex; overflow-x: auto; gap: 15px; padding: 15px; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .carousel-container::-webkit-scrollbar { display: none; }
        .item-small { min-width: 200px; scroll-snap-align: start; background: white; border-radius: 15px; padding: 12px; }
        .img-small { width: 100%; height: 140px; border-radius: 12px; object-fit: cover; }

        /* ESTILOS ORIGINAIS MANTIDOS */
        .combo-card { background: white; border: 2px solid #eee; border-radius: 20px; margin: 0 15px 25px; padding: 15px; animation: moveInOut 4s infinite; }
        @keyframes moveInOut { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        .combo-img { width: 100%; height: 240px; border-radius: 15px; object-fit: cover; }
        .price-new { background: var(--light-green); color: var(--green); padding: 5px 15px; border-radius: 8px; font-size: 24px; font-weight: 900; }
        .btn-add { background: var(--verde); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .modal-cart, #finalizarModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: none; flex-direction: column; padding: 20px; }
        .flying-cake { position: fixed; font-size: 32px; z-index: 10000; transition: all 1.2s ease-in-out; pointer-events: none; }
    </style>
</head>
<body>

    <div class="cart-btn" onclick="openCart()" id="floatingCart">🛒</div>

    <div class="header">
        <div id="status-badge" class="status-badge status-fechado">
            <div id="status-dot" class="dot dot-red"></div>
            <span id="status-label">FECHADO</span>
        </div>
        <div class="logo-circle">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTyiE6cOUfaP9F-l-bziquUfvzasrYRPCZQ3eNI4G1ubodJMTL7ocnhlWY&s=10">
        </div>
        <div style="font-size: 40px; color: #ff40f9; padding: 20px;">Delicias da Ely</div>
    </div>

    <div id="secao-combos"></div>

    <div style="text-align: center; color: #ff40f9; font-size: 25px; margin-top: 20px;">Bolos ⬇</div>
    <div id="carousel-bolos" class="carousel-container"></div>

    <div style="text-align: center; color: #ff40f9; font-size: 25px; margin-top: 20px;">Pronta Entrega ⬇</div>
    <div id="carousel-pronta" class="carousel-container"></div>

    <div id="cartModal" class="modal-cart">
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <h2>Meu Carrinho</h2>
            <button onclick="closeCart()">Voltar</button>
        </div>
        <div id="cartItemsList" style="flex:1; overflow-y:auto;"></div>
        <h3 id="totalPrice">Total: R$ 0,00</h3>
        <button class="btn-add" onclick="abrirFinalizar()">Finalizar Pedido</button>
    </div>

    <div id="finalizarModal">
        <h2>Finalizar Pedido</h2>
        <input type="text" id="nomeCliente" placeholder="Seu Nome" style="width:100%; padding:15px; margin:20px 0;">
        <button class="btn-add" onclick="enviarPedidoWhatsApp()">Enviar para WhatsApp</button>
        <button onclick="fecharFinalizar()">Voltar</button>
    </div>

    <script>
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQwwmjnfOV1_V0zB7ppi24TkUB4DhJpEn1Mys-n_nq-ueix146C-79aFyy9o3jGHGM0ZzVuWM4ZFwQV/pub?output=csv";
        let cart = [];
        let configHorario = { abre: 18, fecha: 23 };

        async function carregarDados() {
            const res = await fetch(sheetUrl);
            const data = await res.text();
            const linhas = data.split('\n').slice(1);

            const containerCombos = document.getElementById('secao-combos');
            const carouselBolos = document.getElementById('carousel-bolos');
            const carouselPronta = document.getElementById('carousel-pronta');

            // Limpar containers
            containerCombos.innerHTML = '';
            carouselBolos.innerHTML = '';
            carouselPronta.innerHTML = '';

            let countBolo = 100;
            let countPronta = 300;

            linhas.forEach(linha => {
                const col = linha.split(',');
                const id = col[1]?.trim();
                const nome = col[2]?.trim();
                const imagem = col[3]?.trim();
                const precoDe = col[4]?.trim();
                const precoPor = col[5]?.trim();

                // Regra ID 5000: Horário
                if (id === "5000") {
                    configHorario.abre = parseInt(nome);
                    configHorario.fecha = parseInt(imagem);
                    checkStatus();
                    return;
                }

                // Renderizar Combos (1000 e 2000)
                if (id === "1000" || id === "2000") {
                    containerCombos.innerHTML += `
                        <div class="combo-card">
                            <img class="combo-img" src="${imagem}">
                            <div style="font-weight:bold;">${nome} (ID: ${id})</div>
                            <div style="text-decoration:line-through; color:gray;">de R$ ${precoDe}</div>
                            <div class="price-new">R$ ${precoPor}</div>
                            <button class="btn-add" onclick="addToCart('${nome}', ${precoPor}, '${imagem}', event, ${id})">Adicionar</button>
                        </div>`;
                } 
                // Renderizar Bolos (100-200)
                else if (countBolo <= 200 && nome && precoPor) {
                    const currentId = countBolo++;
                    carouselBolos.innerHTML += `
                        <div class="item-small">
                            <img class="img-small" src="${imagem}">
                            <div style="font-size:14px; font-weight:bold;">${nome}</div>
                            <div class="price-new" style="font-size:18px;">R$ ${precoPor}</div>
                            <button class="btn-add" onclick="addToCart('${nome}', ${precoPor}, '${imagem}', event, ${currentId})">Adicionar</button>
                        </div>`;
                }
                // Renderizar Pronta Entrega (300-400)
                else if (countPronta <= 400 && nome && precoPor) {
                    const currentId = countPronta++;
                    carouselPronta.innerHTML += `
                        <div class="item-small">
                            <img class="img-small" src="${imagem}">
                            <div style="font-size:14px; font-weight:bold;">${nome}</div>
                            <div class="price-new" style="font-size:18px;">R$ ${precoPor}</div>
                            <button class="btn-add" onclick="addToCart('${nome}', ${precoPor}, '${imagem}', event, ${currentId})">Adicionar</button>
                        </div>`;
                }
            });
        }

        function checkStatus() {
            const hour = new Date().getHours();
            const badge = document.getElementById('status-badge');
            const dot = document.getElementById('status-dot');
            const label = document.getElementById('status-label');

            if (hour >= configHorario.abre && hour < configHorario.fecha) {
                badge.className = "status-badge status-aberto";
                dot.className = "dot dot-green";
                label.innerText = "ABERTO";
            } else {
                badge.className = "status-badge status-fechado";
                dot.className = "dot dot-red";
                label.innerText = "FECHADO";
            }
        }

        function addToCart(name, price, img, event, id) {
            const cake = document.createElement('div');
            cake.innerText = '🎂';
            cake.className = 'flying-cake';
            cake.style.left = event.clientX + 'px';
            cake.style.top = event.clientY + 'px';
            document.body.appendChild(cake);

            const cartBtn = document.getElementById('floatingCart');
            const rect = cartBtn.getBoundingClientRect();

            setTimeout(() => {
                cake.style.left = (rect.left + 15) + 'px';
                cake.style.top = (rect.top + 15) + 'px';
                cake.style.transform = 'scale(0.1)';
            }, 100);

            setTimeout(() => cake.remove(), 1200);

            cart.push({ name, price, img, id });
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cartItemsList');
            const floating = document.getElementById('floatingCart');
            let total = 0;
            list.innerHTML = '';
            
            cart.length > 0 ? floating.classList.add('cart-vibrant') : floating.classList.remove('cart-vibrant');

            cart.forEach((item, idx) => {
                total += parseFloat(item.price);
                list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;">
                    ${item.name} (ID: ${item.id}) - R$ ${item.price} 
                    <span onclick="cart.splice(${idx},1);renderCart()" style="color:red; cursor:pointer;"> [X]</span>
                </div>`;
            });
            document.getElementById('totalPrice').innerText = `Total: R$ ${total.toFixed(2)}`;
        }

        function openCart() { document.getElementById('cartModal').style.display = 'flex'; }
        function closeCart() { document.getElementById('cartModal').style.display = 'none'; }
        function abrirFinalizar() { document.getElementById('finalizarModal').style.display = 'flex'; }
        function fecharFinalizar() { document.getElementById('finalizarModal').style.display = 'none'; }

        function enviarPedidoWhatsApp() {
            const nome = document.getElementById('nomeCliente').value;
            if(!nome) return alert("Diga seu nome");
            let msg = `*Pedido - Delícias da Ely*%0ACliente: ${nome}%0A%0A`;
            cart.forEach(i => msg += `- ${i.name} (ID: ${i.id})%0A`);
            window.open(`https://wa.me/5562995679219?text=${msg}`);
        }

        carregarDados();
        setInterval(checkStatus, 60000);
    </script>
</body>
</html>
